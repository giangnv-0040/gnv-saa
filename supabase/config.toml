# Supabase CLI config — local development
# Docs: https://supabase.com/docs/guides/cli/config
# Generated for gnv-saa (SAA 2025) — Login feature foundation.

project_id = "gnv-saa"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12

[auth.email]
enable_signup = false
enable_confirmations = false

# Google OAuth provider — populate client_id and secret via env at `supabase start` time
# (Supabase CLI reads SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID / _SECRET from .env).
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
skip_nonce_check = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
