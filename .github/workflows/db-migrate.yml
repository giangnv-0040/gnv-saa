name: DB migrate (production)

# Apply `supabase/migrations/*.sql` to the production Supabase project when:
#  1. The change lands on `main` (post-merge), AND
#  2. The diff touches `supabase/migrations/**`.
#
# Vercel will trigger its own deploy on the same push — migrations apply
# first so the new code lands against an up-to-date schema. If this job
# fails, fix the migration and re-push; do NOT run `supabase migration repair`
# without coordinating with the team.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF    production project ref
#   SUPABASE_DB_PASSWORD    DB password (Supabase → Settings → Database)
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch: {}

concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked
